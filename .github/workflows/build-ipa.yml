name: Build and Export IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install signing certificate and provisioning profile
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION }}
        run: |
          echo "$CERT_BASE64" | base64 -d -o certificate.p12
          echo "$MOBILEPROVISION_BASE64" | base64 -d -o profile.mobileprovision

          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import certificate.p12 -k temp.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temp temp.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # 提取描述文件名称（用于手动签名）
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(security cms -D -i profile.mobileprovision))
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Archive project
        run: |
          xcodebuild archive \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -archivePath build/Unity-iPhone.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM=RPYPJPM7RU \
            CODE_SIGN_IDENTITY="Apple Development" \
            "UnityFramework.CODE_SIGN_STYLE=Manual" \
            "UnityFramework.CODE_SIGN_IDENTITY=Apple Development"

      - name: Export IPA
        run: |
          /usr/libexec/PlistBuddy -c "Add method string development" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/Unity-iPhone.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyApp.ipa
          path: build/*.ipa
